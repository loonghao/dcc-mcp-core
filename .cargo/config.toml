# ── Build profile overrides ──────────────────────────────────────────────────
# These override [profile.release] in Cargo.toml for CI and local iteration.
# The release workflow (maturin-action) overrides these back to full optimization
# via MATURIN_* env vars, so these settings only affect cargo-build and dev
# workflows where fast iteration matters more than binary performance.

[profile.release]
opt-level = 1
codegen-units = 16
lto = false
# macOS: "packed" avoids dsymutil which is the #1 macOS link bottleneck.
# On Linux/Windows this setting is ignored.
split-debuginfo = "packed"

[profile.test]
# Speed up test builds: fewer codegen units + line-tables-only debug info.
# Full DWARF (debug=2) is not needed to run tests; line tables are sufficient
# for backtraces. On Windows this shrinks per-binary .pdb files ~70%, which
# cuts link time significantly.
codegen-units = 16
debug = 1

[profile.dev]
# debug=1 (line-tables-only): strips type/variable metadata but keeps file:line
# info for backtraces. Reduces PDB/DWARF by ~70% which speeds up the linker.
# Use `debug = 2` (or `CARGO_PROFILE_DEV_DEBUG=2`) when you need full
# variable inspection in a debugger.
debug = 1
opt-level = 1
codegen-units = 16
# macOS: "packed" avoids dsymutil which is the #1 macOS link bottleneck.
# Windows/Linux: ignored.
split-debuginfo = "packed"

# ── Faster linker for Windows (requires LLVM/LLD installed) ─────────────────
# Install LLVM: winget install LLVM.LLVM
# This replaces the slow MSVC link.exe with LLD (10-30% faster links).
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# ── Compiler cache (sccache) ────────────────────────────────────────────────
# Install: cargo install sccache --locked
# Then set env: SCCACHE_DIR=<cache-dir> RUSTC_WRAPPER=sccache
# To disable: comment out the next line or unset RUSTC_WRAPPER.
[env]
RUSTC_WRAPPER = "sccache"
SCCACHE_DIR = { value = "~/.cache/sccache", relative = false }
SCCACHE_CACHE_SIZE = "2G"

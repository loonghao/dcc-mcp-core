name: 'Build Wheel'
description: 'Build dcc-mcp-core wheel with maturin'

inputs:
  target:
    description: 'Target platform'
    required: false
    default: ''
  python-version:
    description: 'Python version'
    required: false
    default: '3.11'
  rust-version:
    description: 'Rust toolchain version'
    required: false
    default: '1.90.0'
  maturin-extra-args:
    description: 'Extra maturin args (e.g. --sdist, -i python3.7). Features
      and --release/--out are set by this action from the justfile.'
    required: false
    default: '--find-interpreter'
  test-wheel:
    description: 'Test the built wheel'
    required: false
    default: 'true'
  artifact-name:
    description: 'Artifact name'
    required: false
    default: 'wheels'
  use-sccache:
    description: 'Use sccache'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-version }}

    - name: Install just
      uses: extractions/setup-just@v4

    - name: Cache Cargo
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-${{ inputs.target || 'default' }}-py${{ inputs.python-version }}-cargo-wheel-${{ hashFiles('**/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.target || 'default' }}-cargo-wheel-

    - name: Resolve features from justfile
      id: resolve-features
      shell: bash
      run: |
        # Single source of truth: the feature list lives in justfile.
        # Python 3.7 cannot use abi3-py38 (PyO3 requires interpreter >= 3.8).
        if [[ "${{ inputs.python-version }}" == "3.7" ]]; then
          features=$(just print-wheel-features-py37)
        else
          features=$(just print-wheel-features)
        fi
        args="--release --out dist --features ${features} ${{ inputs.maturin-extra-args }}"
        echo "Resolved maturin args: ${args}"
        echo "value=${args}" >> "$GITHUB_OUTPUT"

    - name: Generate type stubs
      shell: bash
      run: just stubgen

    - name: Build wheel
      uses: PyO3/maturin-action@v1
      with:
        target: ${{ inputs.target }}
        args: ${{ steps.resolve-features.outputs.value }}
        rust-toolchain: ${{ inputs.rust-version }}
        sccache: ${{ inputs.use-sccache == 'true' }}
        manylinux: auto

    - name: Test wheel
      if: inputs.test-wheel == 'true'
      shell: bash
      run: |
        # Use python -m venv for Python 3.7 (uv does not support 3.7)
        python -m venv test-env
        if [ "${{ runner.os }}" = "Windows" ]; then
          source test-env/Scripts/activate
        else
          source test-env/bin/activate
        fi

        pip install --no-index --find-links dist dcc-mcp-core --force-reinstall --no-deps

        python -c "
        import dcc_mcp_core
        print(f'Version: {dcc_mcp_core.__version__}')
        from dcc_mcp_core._core import ToolRegistry, ToolResult, SkillScanner
        result = ToolResult(success=True, message='Wheel test passed')
        print(f'Result: {result}')
        reg = ToolRegistry()
        print(f'Registry: {reg}')
        print('All imports OK!')
        "

    - name: Upload wheel
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: dist/
        retention-days: 30

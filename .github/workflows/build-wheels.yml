name: Build Wheels

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      test-wheel:
        required: false
        type: string
        default: 'true'

concurrency:
  group: build-wheels-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── ABI3 builds (Python 3.8+) — one wheel works for all 3.8+ ──

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-wheel
        with:
          target: x86_64
          python-version: '3.11'
          artifact-name: wheels-linux-x86_64

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-wheel
        with:
          target: x64
          python-version: '3.11'
          artifact-name: wheels-windows-x64

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-wheel
        with:
          target: universal2-apple-darwin
          python-version: '3.11'
          maturin-extra-args: '--sdist --find-interpreter'
          artifact-name: wheels-macos-universal2

  # ── Python 3.7 builds (non-abi3) — separate wheel for Python 3.7 only ──
  # Note: macOS Python 3.7 build is not included because:
  # - macOS-13 (x86_64) runners have been retired (Sept 2025)
  # - macOS-15 (ARM64) does not support Python 3.7
  # Users needing Python 3.7 on macOS should install from source distribution

  linux-py37:
    runs-on: ubuntu-22.04  # Python 3.7 not available on Ubuntu 24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-wheel
        with:
          target: x86_64
          python-version: '3.7'
          # Non-abi3 build (py37 branch in build-wheel action auto-picks
          # WHEEL_FEATURES_PY37 from justfile).
          maturin-extra-args: '-i python3.7'
          test-wheel: ${{ inputs.test-wheel || 'true' }}
          artifact-name: wheels-linux-x86_64-py37
          use-sccache: 'false'

  windows-py37:
    runs-on: windows-2022  # Python 3.7 not available on newer Windows runners
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-wheel
        with:
          target: x64
          python-version: '3.7'
          # Non-abi3 build (py37 branch in build-wheel action auto-picks
          # WHEEL_FEATURES_PY37 from justfile).
          maturin-extra-args: '-i python3.7'
          test-wheel: ${{ inputs.test-wheel || 'true' }}
          artifact-name: wheels-windows-x64-py37
          use-sccache: 'false'

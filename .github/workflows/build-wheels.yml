name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      checkout-ref:
        description: "Git ref to build, for example v0.15.4"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      test-wheel:
        required: false
        type: string
        default: 'true'
      checkout-ref:
        required: false
        type: string
        default: ""

concurrency:
  # Scope by the resolved checkout target so a release-driven build for tag
  # vX.Y.Z is never grouped with (and never cancelled by) another run for a
  # different ref. Falls back to github.ref when no checkout-ref is provided.
  group: build-wheels-${{ inputs.checkout-ref || github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── ABI3 builds (Python 3.8+) — one wheel works for all 3.8+ ──

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: x86_64
          python-version: '3.11'
          artifact-name: wheels-linux-x86_64

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: x64
          python-version: '3.11'
          artifact-name: wheels-windows-x64

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: universal2-apple-darwin
          python-version: '3.11'
          maturin-extra-args: '--sdist --find-interpreter'
          artifact-name: wheels-macos-universal2

  # ── Python 3.7 builds (non-abi3) — separate wheel for Python 3.7 only ──
  # macOS cp37 wheels are cross-compiled from ARM64 (macos-latest) to x86_64.
  # Python 3.7.17 x86_64 is downloaded from python.org and runs via Rosetta 2;
  # the Rust extension is compiled for x86_64-apple-darwin.

  linux-py37:
    runs-on: ubuntu-22.04  # Python 3.7 not available on Ubuntu 24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: x86_64
          python-version: '3.7'
          # Non-abi3 build (py37 branch in build-wheel action auto-picks
          # WHEEL_FEATURES_PY37 from justfile).
          maturin-extra-args: '-i python3.7'
          test-wheel: ${{ inputs.test-wheel || 'true' }}
          artifact-name: wheels-linux-x86_64-py37
          use-sccache: 'false'

  windows-py37:
    runs-on: windows-2022  # Python 3.7 not available on newer Windows runners
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
      - uses: ./.github/actions/build-wheel
        with:
          target: x64
          python-version: '3.7'
          # Non-abi3 build (py37 branch in build-wheel action auto-picks
          # WHEEL_FEATURES_PY37 from justfile).
          maturin-extra-args: '-i python3.7'
          test-wheel: ${{ inputs.test-wheel || 'true' }}
          artifact-name: wheels-windows-x64-py37
          use-sccache: 'false'

  macos-py37:
    # macOS ARM64 runner cross-compiling to x86_64.
    # Python 3.7 has no native ARM64 build, so we download the x86_64
    # installer from python.org and run it via Rosetta 2. The Rust
    # extension targets x86_64-apple-darwin.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Install Python 3.7.9 (x86_64, Rosetta 2)
        shell: bash
        run: |
          curl -fsSL -o /tmp/python-3.7.9-macosx10.9.pkg \
            https://www.python.org/ftp/python/3.7.9/python-3.7.9-macosx10.9.pkg
          sudo installer -pkg /tmp/python-3.7.9-macosx10.9.pkg -target /
          PY37=/Library/Frameworks/Python.framework/Versions/3.7/bin/python3.7
          echo "PY37=${PY37}" >> "$GITHUB_ENV"
          "${PY37}" --version
          "${PY37}" -c "import sys; print(sys.version); print(sys.maxsize > 2**32)"
          file "${PY37}"
          "${PY37}" -m pip install --upgrade "pip>=20.0"

      - name: Setup host Python (runs maturin)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.95.0'

      - name: Add x86_64-apple-darwin Rust target
        run: rustup target add x86_64-apple-darwin

      - uses: loonghao/vx@v0.9.11
        with:
          version: "0.9.11"
          cache-key-prefix: "vx-tools-v0.9.7"
          cache: "false"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-macos-py37
          shared-key: rust-macos-py37

      - name: Install maturin (host Python 3.11)
        shell: bash
        run: python -m pip install "maturin>=1.5,<2.0"

      - name: Resolve build features (py37 non-abi3)
        id: resolve-features
        shell: bash
        run: |
          features=$(vx just print-wheel-features-py37)
          echo "features=${features}" >> "$GITHUB_OUTPUT"

      - name: Build wheel (x86_64-apple-darwin, cp37)
        shell: bash
        env:
          DCC_MCP_ADMIN_UI_PREBUILT: "1"
          ARCHFLAGS: "-arch x86_64"
          MACOSX_DEPLOYMENT_TARGET: "10.9"
        run: |
          python -m maturin build \
            --release \
            --out dist \
            --target x86_64-apple-darwin \
            --features "${{ steps.resolve-features.outputs.features }}" \
            -i "${PY37}"

      - name: Check wheel contents
        shell: bash
        run: |
          "${PY37}" -m pip install check-wheel-contents
          "${PY37}" -m check_wheel_contents --ignore W004 dist/*.whl

      - name: Test wheel
        if: ${{ inputs.test-wheel || 'true' }}
        shell: bash
        run: |
          "${PY37}" -m venv test-env
          source test-env/bin/activate
          pip install --no-index --find-links dist dcc-mcp-core --force-reinstall --no-deps
          pip check
          python tests/test_imports.py

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-x86_64-py37
          path: dist/
          retention-days: 30

name: CI

# Core CI: Rust checks, wheel build, Python tests, lint.
# DCC integration tests live in dcc-integration.yml.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust checks (check + clippy + fmt + cargo test) ──
  rust-check:
    name: Rust (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: loonghao/vx@v0.8.32
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: preflight
      - name: Install cargo-hakari
        run: cargo install cargo-hakari --locked
      - name: Verify workspace-hack is up to date
        run: cargo hakari verify
      - name: Preflight (check + clippy + fmt + test)
        run: vx just preflight

  # ── Rust code coverage (tarpaulin, Linux only) ──
  rust-coverage:
    name: Rust coverage
    needs: [rust-check]
    runs-on: ubuntu-latest
    # id-token: write is required for Codecov tokenless OIDC upload on
    # protected branches. See https://docs.codecov.com/docs/codecov-tokens
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: loonghao/vx@v0.8.32
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: tarpaulin
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Run Rust coverage
        run: vx just rust-cov
      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/cobertura.xml
          flags: rust
          name: rust-coverage
          use_oidc: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Build ABI3 wheel (one per OS, reused by python-test) ──
  build-wheel:
    name: Build wheel (${{ matrix.os }})
    needs: [rust-check]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: loonghao/vx@v0.8.32
      - name: Install maturin
        run: pip install maturin
        shell: bash
      - name: Build wheel
        run: vx just build
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.os }}
          # `vx just build` outputs to `dist/` (see root justfile `build` recipe)
          path: dist/*.whl

  # ── Python tests: matrix over OS × Python versions ──
  python-test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: [build-wheel]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    # id-token: write enables Codecov tokenless OIDC on the upload step below.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: loonghao/vx@v0.8.32
      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel-${{ matrix.os }}
          path: dist/
      - name: Install wheel + test deps
        run: pip install --no-index --find-links dist dcc-mcp-core && pip install pytest pytest-cov
        shell: bash
      - name: Test with coverage
        run: vx just test-cov
      - name: Upload Python coverage to Codecov
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: python
          name: python-coverage
          use_oidc: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Python 3.7 build + test (non-abi3 wheel) ──
  # Uses the same composite action as the release workflow so CI mirrors the
  # exact environment that caused the windows-py37 failure post-merge.
  # Previously this job used Python 3.14 as the active interpreter and called
  # `just build-py37` directly, which hid a pyo3-stub-gen Python<3.10 compat
  # bug (PyEncodingWarning missing on py37) that only surfaced in the release
  # build-wheels workflow. Now both paths go through the same composite action.
  # Note: Must use older OS runners where Python 3.7 is still available via setup-python
  build-wheel-py37:
    name: Build wheel (py3.7, ${{ matrix.os }})
    needs: [rust-check]
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04  # Ubuntu 24.04 dropped Python 3.7 support
            target: x86_64
          - os: windows-2022  # Use Windows 2022 for Python 3.7 availability
            target: x64
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-wheel
        with:
          target: ${{ matrix.target }}
          python-version: "3.7"
          maturin-extra-args: '-i python3.7'
          test-wheel: 'true'
          artifact-name: wheel-py37-${{ matrix.os }}
          use-sccache: 'false'

  # ── Lint Python source ──
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: loonghao/vx@v0.8.32
      - name: Install dev deps
        run: vx just install-dev-deps
      - name: Lint
        run: vx just lint-py

  # -- mcporter e2e: real MCP client (npx mcporter) vs live McpHttpServer --
  # Exercises the full HTTP stack from outside the process:
  #   tools/list, tools/call, find_skills, load_skill, unload_skill,
  #   progressive loading (discover -> load -> call -> unload)
  mcporter-e2e:
    name: mcporter e2e
    needs: [build-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      # Node.js 20 ships npx; mcporter is fetched via npx --yes at runtime
      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel-ubuntu-latest
          path: dist/

      - name: Install wheel + test deps
        run: pip install --no-index --find-links dist dcc-mcp-core && pip install pytest anyio
        shell: bash

      # Install mcporter globally to avoid per-test npx download timeouts.
      # The global binary is detected by the test suite and used directly.
      - name: Install mcporter globally
        run: npm install -g mcporter
        shell: bash

      - name: Verify mcporter
        run: mcporter --version
        shell: bash

      - name: Run mcporter e2e tests
        run: pytest tests/test_mcp_mcporter_e2e.py -v --tb=short
        shell: bash

  # ── Transport bench + turmoil fault-injection (issue #251 AC#2/AC#3) ──
  # Runs on Linux only — cargo-criterion and turmoil produce deterministic
  # output once a platform baseline is chosen. The gate reports failures
  # to the PR but does not block merges yet; flip `fail_ci_if_error` after
  # the baseline numbers are captured.
  transport-bench-and-fault:
    name: Transport bench + turmoil
    needs: [rust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: bench

      # Issue #251 AC#3: deterministic network fault injection.
      - name: turmoil TCP fault-injection tests
        run: cargo test -p dcc-mcp-transport --test turmoil_tcp_fault --release
        shell: bash

      # Issue #251 AC#2: 10k req/s bench. We intentionally do not enforce
      # a hard p99 gate here yet — Criterion's HTML report is archived so
      # regressions can be spotted in the CI artifact. Adding a hard
      # threshold requires a per-platform baseline first (future work).
      - name: DccLink criterion bench (short run)
        run: |
          cargo bench -p dcc-mcp-transport --bench dcclink_ipc -- \
            --sample-size 50 --measurement-time 5
        shell: bash
        env:
          CRITERION_CI: "1"

      - name: Upload criterion HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-report
          path: target/criterion/
          if-no-files-found: ignore

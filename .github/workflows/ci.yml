name: CI

# Core CI: Rust checks, wheel build, Python tests, lint.
# DCC integration tests live in dcc-integration.yml.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust checks (check + clippy + fmt + cargo test) ──
  rust-check:
    name: Rust (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: extractions/setup-just@v4
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Preflight (check + clippy + fmt + test)
        run: just preflight

  # ── Rust code coverage (tarpaulin, Linux only) ──
  rust-coverage:
    name: Rust coverage
    needs: [rust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-cargo-tarpaulin-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ubuntu-cargo-
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Run Rust coverage
        run: cargo tarpaulin --workspace --out Xml --output-dir coverage/ --timeout 300
      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/cobertura.xml
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false

  # ── Build ABI3 wheel (one per OS, reused by python-test) ──
  build-wheel:
    name: Build wheel (${{ matrix.os }})
    needs: [rust-check]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: extractions/setup-just@v4
      - name: Install maturin
        run: pip install maturin
        shell: bash
      - name: Build wheel
        run: just build
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.os }}
          path: target/wheels/*.whl

  # ── Python tests: matrix over OS × Python versions ──
  python-test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: [build-wheel]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: extractions/setup-just@v4
      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel-${{ matrix.os }}
          path: dist/
      - name: Install wheel + test deps
        run: pip install --no-index --find-links dist dcc-mcp-core && pip install pytest pytest-cov
        shell: bash
      - name: Test with coverage
        run: just test-cov
      - name: Upload Python coverage to Codecov
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: false

  # ── Python 3.7 build + test (non-abi3 wheel) ──
  # Note: Must use older OS runners where Python 3.7 is still available via setup-python
  build-wheel-py37:
    name: Build wheel (py3.7, ${{ matrix.os }})
    needs: [rust-check]
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04  # Ubuntu 24.04 dropped Python 3.7 support
            target: x86_64
          - os: windows-2022  # Use Windows 2022 for Python 3.7 availability
            target: x64
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: extractions/setup-just@v4
      - name: Install maturin
        run: pip install maturin
        shell: bash
      - name: Build Python 3.7 wheel (non-abi3)
        run: maturin build --release --out dist --features python-bindings,ext-module
        shell: bash
      - name: Test Python 3.7 wheel
        shell: bash
        run: |
          python -m venv test-env
          if [ "${{ runner.os }}" = "Windows" ]; then
            source test-env/Scripts/activate
          else
            source test-env/bin/activate
          fi
          pip install --no-index --find-links dist dcc-mcp-core --force-reinstall --no-deps
          python -c "
          import dcc_mcp_core
          print(f'Version: {dcc_mcp_core.__version__}')
          from dcc_mcp_core._core import ActionResultModel, ActionRegistry, SkillScanner
          result = ActionResultModel(success=True, message='Wheel test passed')
          print(f'Result: {result}')
          print('All imports OK!')
          "
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-py37-${{ matrix.os }}
          path: dist/*.whl

  # ── Lint Python source ──
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: extractions/setup-just@v4
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: just lint-py

  # -- mcporter e2e: real MCP client (npx mcporter) vs live McpHttpServer --
  # Exercises the full HTTP stack from outside the process:
  #   tools/list, tools/call, find_skills, load_skill, unload_skill,
  #   progressive loading (discover -> load -> call -> unload)
  mcporter-e2e:
    name: mcporter e2e
    needs: [build-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      # Node.js 20 ships npx; mcporter is fetched via npx --yes at runtime
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel-ubuntu-latest
          path: dist/

      - name: Install wheel + test deps
        run: pip install --no-index --find-links dist dcc-mcp-core && pip install pytest anyio
        shell: bash

      # Install mcporter globally to avoid per-test npx download timeouts.
      # The global binary is detected by the test suite and used directly.
      - name: Install mcporter globally
        run: npm install -g mcporter
        shell: bash

      - name: Verify mcporter
        run: mcporter --version
        shell: bash

      - name: Run mcporter e2e tests
        run: pytest tests/test_mcp_mcporter_e2e.py -v --tb=short
        shell: bash

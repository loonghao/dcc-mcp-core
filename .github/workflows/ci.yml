name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust checks (same as `just preflight`) ──
  rust-check:
    name: Rust (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Preflight (check + clippy + fmt + test)
        run: just preflight

  # ── Build ABI3 wheel once per OS ──
  build-wheel:
    name: Build wheel (${{ matrix.os }})
    needs: [rust-check]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install just + maturin
        run: |
          pip install maturin
        shell: bash

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Build wheel
        run: just build

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: target/wheels/*.whl

  # ── Test wheel on multiple Python versions ──
  python-test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: [build-wheel]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/

      - name: Install wheel + test deps
        run: |
          pip install dist/*.whl
          pip install pytest pytest-cov
        shell: bash

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Test
        run: just test

  # ── Lint Python source ──
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Install linters
        run: pip install ruff isort
      - name: Lint
        run: just lint-py

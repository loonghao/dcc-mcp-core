name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust checks (same as `just preflight`) ──
  rust-check:
    name: Rust (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Preflight (check + clippy + fmt + test)
        run: just preflight

  # ── Python lint + test (uses built wheel) ──
  python-check:
    name: Python (${{ matrix.os }}, ${{ matrix.python-version }})
    needs: [rust-check]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Build wheel (maturin develop)
        run: |
          pip install maturin
          just dev

      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-mock pytest-asyncio pyfakefs

      - name: Test
        run: just test

      - name: Lint (ruff + isort)
        run: |
          pip install ruff isort
          just lint-py

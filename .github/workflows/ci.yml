name: CI

# Core CI: Rust checks, wheel build, Python tests, lint.
# DCC integration tests live in dcc-integration.yml.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust checks (check + clippy + fmt + cargo test) ──
  rust-check:
    name: Rust (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: extractions/setup-just@v3
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Preflight (check + clippy + fmt + test)
        run: just preflight

  # ── Build ABI3 wheel (one per OS, reused by python-test) ──
  build-wheel:
    name: Build wheel (${{ matrix.os }})
    needs: [rust-check]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: extractions/setup-just@v3
      - name: Install maturin
        run: pip install maturin
        shell: bash
      - name: Build wheel
        run: just build
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.os }}
          path: target/wheels/*.whl

  # ── Python tests: matrix over OS × Python versions ──
  # Python 3.8 uses ubuntu-20.04 (ubuntu-latest=24.04 doesn't ship 3.8).
  # Windows/macOS runners provide Python 3.8 natively.
  python-test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: [build-wheel]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          # Python 3.8 on Linux needs an older Ubuntu that ships it
          - os: ubuntu-20.04
            python-version: "3.8"
        exclude:
          # Exclude ubuntu-latest + 3.8 (not available); ubuntu-20.04 above covers it
          - os: ubuntu-latest
            python-version: "3.8"
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: extractions/setup-just@v3
      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel-${{ matrix.os == 'ubuntu-20.04' && 'ubuntu-latest' || matrix.os }}
          path: dist/
      - name: Install wheel + test deps
        run: pip install --no-index --find-links dist dcc-mcp-core && pip install pytest pytest-cov
        shell: bash
      - name: Test with coverage
        run: just test-cov
      - name: Upload coverage
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  # ── Lint Python source ──
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: extractions/setup-just@v3
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: just lint-py

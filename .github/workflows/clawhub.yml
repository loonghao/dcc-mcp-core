name: Sync ClawHub Skills

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "Git ref to publish from, such as a release tag"
        required: false
        type: string
        default: ""
      publish:
        description: "Publish to ClawHub instead of dry-running"
        required: false
        type: boolean
        default: false
    secrets:
      CLAWHUB_TOKEN:
        required: true
      PERSONAL_ACCESS_TOKEN:
        required: false
  pull_request:
    branches:
      - main
    paths:
      - "skills/**"
      - "scripts/package_openclaw_skill.py"
      - "scripts/clawhub_sync.py"
      - ".github/clawhub-skills.json"
      - ".github/workflows/clawhub.yml"
      - "justfile"
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "scripts/package_openclaw_skill.py"
      - "scripts/clawhub_sync.py"
      - ".github/clawhub-skills.json"
      - ".github/workflows/clawhub.yml"
      - "justfile"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to ClawHub instead of dry-running"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: clawhub-skills-${{ github.ref }}
  cancel-in-progress: false

env:
  CLAWHUB_CLI_PACKAGE: clawhub@0.17.0
  CLAWHUB_CONFIG_PATH: .clawhub/config.json
  CLAWHUB_DISABLE_TELEMETRY: "1"

jobs:
  sync-skills:
    name: Package and sync skills to ClawHub
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dcc-mcp-core (for validate_skill / parse_skill_md)
        run: pip install -e .

      - name: Package ClawHub skill archives
        env:
          CLAWHUB_SKILLS_MANIFEST: .github/clawhub-skills.json
        run: |
          mkdir -p dist/skills
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          manifest = json.loads(Path(os.environ["CLAWHUB_SKILLS_MANIFEST"]).read_text(encoding="utf-8"))
          for entry in manifest:
              subprocess.run(
                  [sys.executable, "scripts/package_openclaw_skill.py", entry["path"], "dist/skills"],
                  check=True,
              )
          PY

      - name: Upload packaged skill artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawhub-skill-packages
          path: dist/skills/*.zip
          if-no-files-found: error

      - name: Require ClawHub token
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_call' && inputs.publish) ||
          (github.event_name == 'workflow_dispatch' && inputs.publish)
        shell: bash
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [[ -z "${CLAWHUB_TOKEN}" ]]; then
            echo "Missing CLAWHUB_TOKEN repository secret" >&2
            exit 1
          fi

      - name: Login to ClawHub
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_call' && inputs.publish) ||
          (github.event_name == 'workflow_dispatch' && inputs.publish)
        shell: bash
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          mkdir -p "$(dirname "$CLAWHUB_CONFIG_PATH")"
          npx "$CLAWHUB_CLI_PACKAGE" login --token "$CLAWHUB_TOKEN" --no-browser --no-input

      - name: Dry-run ClawHub publish
        if: >-
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_call' && !inputs.publish) ||
          (github.event_name == 'workflow_dispatch' && !inputs.publish)
        run: python scripts/clawhub_sync.py --dry-run

      - name: Publish skills to ClawHub
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_call' && inputs.publish) ||
          (github.event_name == 'workflow_dispatch' && inputs.publish)
        run: python scripts/clawhub_sync.py

name: MR Checks
on: [pull_request]

jobs:
  python-check:
    strategy:
      max-parallel: 30
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python ${{ matrix.python-version }}
        run: |
          vx uv python install ${{ matrix.python-version }}

      - name: Install project
        run: |
          vx uv sync --python ${{ matrix.python-version }}

      - name: Pre-commit (prek)
        run: |
          vx prek --all-files

      - name: Lint
        run: |
          vx uvx nox -s lint

      - name: Test
        run: |
          vx uvx nox -s pytest

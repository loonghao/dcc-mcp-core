name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write
  actions: read

jobs:
  # ── Release Please (only on main branch push) ──
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Build standalone dcc-mcp-server binaries ──
  build-binaries:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: dcc-mcp-server-linux-x86_64
            binary: dcc-mcp-server
          - os: windows-latest
            artifact_name: dcc-mcp-server-windows-x86_64.exe
            binary: dcc-mcp-server.exe
          - os: macos-latest
            artifact_name: dcc-mcp-server-macos-universal2
            binary: dcc-mcp-server
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.90.0'
          targets: aarch64-apple-darwin  # needed for macOS universal2 lipo

      - uses: loonghao/vx@v0.8.31

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-binary-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-binary-

      - name: Build binary (macOS universal2)
        if: matrix.os == 'macos-latest'
        run: vx just build-server-universal

      - name: Build binary (Linux / Windows)
        if: matrix.os != 'macos-latest'
        run: vx just build-server
        shell: bash

      - name: Stage artifact (Linux / Windows)
        if: matrix.os != 'macos-latest'
        run: cp target/release/${{ matrix.binary }} ${{ matrix.artifact_name }}
        shell: bash

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ matrix.artifact_name }}

  # ── Build wheels only when release-please creates a release ──
  build-wheels:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/build-wheels.yml
    with:
      test-wheel: 'true'

  # ── Publish to PyPI ──
  publish:
    needs: [release-please, build-wheels]
    if: |
      needs.release-please.outputs.release_created == 'true' &&
      needs.build-wheels.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dcc-mcp-core
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: List wheels
        run: ls -la dist/

      # Trusted Publishers — no credentials needed
      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
          print-hash: true

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

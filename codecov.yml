# Codecov configuration for dcc-mcp-core
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  # Overall project coverage status — reported as informational (never blocks CI).
  # We surface coverage trends in the PR comment/badge without gating merges on a
  # hard threshold; targets stay as aspirational reference values only.
  status:
    project:
      default:
        target: 80%           # Aspirational overall coverage target
        threshold: 2%         # Allow 2% drop before marking as regressing
        if_not_found: success # Don't fail if no report found (first run)
        informational: true   # Always pass — report coverage as a warning, never block
      python:
        target: 80%
        threshold: 2%
        flags: [python]
        if_not_found: success
        informational: true
      rust:
        target: 80%
        threshold: 2%
        flags: [rust]
        if_not_found: success
        informational: true
    patch:
      default:
        target: 70%           # Aspirational target for new code in PRs
        threshold: 5%
        if_not_found: success
        informational: true   # Non-blocking — coverage reported, never fails the check

  precision: 2
  round: down
  range: "70...100"           # Color range: red below 70, green at 100

# What to include/exclude
ignore:
  - "docs/**"
  - "examples/**"
  - "**/*.md"
  - ".agents/**"
  - "tests/**"                # Test code excluded from coverage target

comment:
  # See https://docs.codecov.com/docs/pull-request-comments
  layout: "condensed_header, diff, flags, components, condensed_files, condensed_footer"
  behavior: default           # Update the existing comment when one already exists
  require_changes: false      # Post even when coverage did not change (keeps visibility on every PR)
  require_base: false         # Still comment on the first PR when no base report exists yet
  require_head: true          # Head report must exist (this PR uploaded coverage)
  show_carryforward_flags: true
  hide_project_coverage: false

# Parse flags from CI uploads
flag_management:
  default_rules:
    carryforward: true        # Carry forward coverage if job didn't run

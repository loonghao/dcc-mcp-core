[package]
name = "dcc-mcp-transport"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Async transport layer for the DCC-MCP ecosystem (connection pool, service discovery, benchmarks)"

[dependencies]
pyo3 = { workspace = true, optional = true }

# Type-stub generation (opt-in via `stub-gen` feature).
pyo3-stub-gen = { workspace = true, optional = true }
pyo3-stub-gen-derive = { workspace = true, optional = true }

serde = { workspace = true }
serde_json = { workspace = true }
dashmap = { workspace = true }
parking_lot = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
tokio = { workspace = true }
rmp-serde = { workspace = true }
dcc-mcp-pybridge = { workspace = true, optional = true }
sysinfo.workspace = true
ipckit.workspace = true
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[dev-dependencies]
criterion = { workspace = true }
rstest = "0.26"
tempfile = "3.14"
tokio = { workspace = true, features = ["test-util"] }
# Deterministic network fault injection (issue #251 AC#3).
# Scoped to tcp-only simulation — the IPC-backed paths are covered by
# tests/fault_injection.rs which runs against real Named Pipes / Unix sockets.
turmoil = "0.7"

[[bench]]
name = "dcclink_frame"
harness = false

[[bench]]
name = "dcclink_ipc"
harness = false

[features]
default = []
python-bindings = ["pyo3", "dep:dcc-mcp-pybridge", "dcc-mcp-pybridge/python-bindings"]
# Enable `pyo3-stub-gen` annotations on this crate's PyO3 types.
stub-gen = ["python-bindings", "dep:pyo3-stub-gen", "dep:pyo3-stub-gen-derive"]

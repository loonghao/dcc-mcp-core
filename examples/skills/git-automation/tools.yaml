tools:
  - name: log
    description: Show recent commit history
    input_schema:
      type: object
      properties:
        limit:
          type: integer
          description: Number of commits to show
          default: 20
        format:
          type: string
          description: Log format (oneline, short, full)
          default: oneline
    read_only: true
    idempotent: true
    source_file: scripts/log.py

  - name: diff
    description: Show changes between commits or working tree
    input_schema:
      type: object
      properties:
        from_ref:
          type: string
          description: Base commit/branch (default HEAD)
        to_ref:
          type: string
          description: Target commit/branch
    read_only: true
    idempotent: true
    source_file: scripts/diff.py

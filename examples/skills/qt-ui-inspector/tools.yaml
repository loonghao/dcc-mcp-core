tools:
  - name: list_windows
    description: "List every top-level Qt window with object name, class, visibility, geometry, and child widget count. Use first to discover what is on screen."
    input_schema:
      type: object
      properties:
        include_hidden:
          type: boolean
          description: "Include windows whose isVisible() returns false (default false)."
          default: false
        max_results:
          type: integer
          description: "Cap on number of windows returned (default 64, hard max 256)."
          default: 64
    read_only: true
    idempotent: true
    annotations:
      read_only_hint: true
      open_world_hint: false
    source_file: scripts/list_windows.py
    tool_role: read_only
    risk: low

  - name: find_widgets
    description: "Locate widgets by object name (exact or substring), class name, or a property predicate. Returns a bounded JSON-safe list of widget descriptors."
    input_schema:
      type: object
      properties:
        object_name:
          type: string
          description: "Match QObject.objectName() exactly or by substring (see object_name_match)."
        object_name_match:
          type: string
          enum: ["exact", "substring", "regex"]
          default: "exact"
        class_name:
          type: string
          description: "Match Qt class name (e.g. 'QPushButton'). Substring match."
        visible_only:
          type: boolean
          description: "Restrict to widgets whose isVisible() is true (default true)."
          default: true
        max_results:
          type: integer
          description: "Hard cap on result count (default 64, hard max 1024)."
          default: 64
    read_only: true
    idempotent: true
    annotations:
      read_only_hint: true
    source_file: scripts/find_widgets.py
    tool_role: read_only
    risk: low

  - name: describe_widget
    description: "Return a single widget's structured state - class, object name, geometry, enabled/visible flags, accessible name/description, and a bounded properties snapshot."
    input_schema:
      type: object
      properties:
        widget_id:
          type: string
          description: "Stable widget identifier returned by list_windows / find_widgets / snapshot_tree."
      required: ["widget_id"]
    read_only: true
    idempotent: true
    annotations:
      read_only_hint: true
    source_file: scripts/describe_widget.py
    tool_role: read_only
    risk: low

  - name: snapshot_tree
    description: "Walk the widget tree under a root and return the structure as a JSON-safe tree. Depth is clamped so large hosts stay responsive."
    input_schema:
      type: object
      properties:
        root_widget_id:
          type: string
          description: "Optional root widget id. When omitted, snapshots every top-level window."
        max_depth:
          type: integer
          description: "Maximum tree depth (default 4, hard max 16)."
          default: 4
        max_nodes:
          type: integer
          description: "Maximum total nodes returned (default 256, hard max 4096). The walk stops early if exceeded."
          default: 256
    read_only: true
    idempotent: true
    annotations:
      read_only_hint: true
    source_file: scripts/snapshot_tree.py
    tool_role: read_only
    risk: low

  - name: wait_for_widget
    description: "Poll for a widget matching the given criteria, returning as soon as it appears or timing out cleanly."
    input_schema:
      type: object
      properties:
        object_name:
          type: string
          description: "Match QObject.objectName() exactly."
        class_name:
          type: string
          description: "Match Qt class name (substring)."
        visible:
          type: boolean
          description: "Require widget to be visible when matched (default true)."
          default: true
        enabled:
          type: boolean
          description: "Require widget to be enabled when matched (default true)."
          default: true
        timeout_ms:
          type: integer
          description: "Maximum wait in ms (default 5000, hard max 60000)."
          default: 5000
        poll_interval_ms:
          type: integer
          description: "Poll interval in ms (default 100, hard min 25)."
          default: 100
    read_only: true
    idempotent: false
    annotations:
      read_only_hint: true
    source_file: scripts/wait_for_widget.py
    tool_role: read_only
    risk: low

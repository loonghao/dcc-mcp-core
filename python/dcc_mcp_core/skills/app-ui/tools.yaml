tools:
  - name: snapshot
    description: >-
      Capture a bounded app_ui snapshot from the scoped application window.
      Start here before UI actions; use the returned snapshot_id when acting so
      stale controls can be detected.
    input_schema:
      type: object
      properties:
        session_id:
          type: string
          description: "app_ui session id. Defaults to 'default'."
        policy:
          type: object
          description: "Optional app_ui policy override for this call."
    read_only: true
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
    execution: sync
    affinity: any
    timeout_hint_secs: 2
    source_file: scripts/snapshot.py
    next-tools:
      on-success:
        - app_ui__find

  - name: find
    description: >-
      Locate controls in the scoped app_ui snapshot by query, role, label, or
      object name. Returns normalized UiControlNode matches.
    input_schema:
      type: object
      properties:
        session_id:
          type: string
          description: "app_ui session id. Defaults to 'default'."
        query:
          type: string
          description: "Text query matched against id, label, text, value, and object_name."
        role:
          type: string
          description: "Control role filter, for example button, text_field, checkbox, or label."
        label:
          type: string
          description: "Exact or case-insensitive label filter."
        object_name:
          type: string
          description: "Host object/control name filter."
        limit:
          type: integer
          description: "Maximum matches to return."
          default: 10
        policy:
          type: object
          description: "Optional app_ui policy override for this call."
    read_only: true
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
    execution: sync
    affinity: any
    timeout_hint_secs: 2
    source_file: scripts/find.py
    next-tools:
      on-success:
        - app_ui__act
        - app_ui__wait_for

  - name: act
    description: >-
      Perform one scoped app_ui action against a resolved control id. Supports
      click, set_text, toggle, and focus where the selected backend supports
      them. Raw coordinates and keyboard shortcuts are denied by default policy.
    input_schema:
      type: object
      required: [control_id, action]
      properties:
        session_id:
          type: string
          description: "app_ui session id. Defaults to 'default'."
        control_id:
          type: string
          description: "Control id returned by app_ui__snapshot or app_ui__find."
        action:
          type: string
          enum: [click, set_text, toggle, set_checked, focus, raw_coordinate_click, keyboard_shortcut]
          description: "Action kind to perform."
        text:
          type: string
          description: "Text payload for set_text. Redacted from audit unless policy allows sensitive values."
        checked:
          type: boolean
          description: "Explicit checked state for set_checked."
        snapshot_id:
          type: string
          description: "Snapshot id from observation. If stale, the action returns stale_control."
        policy:
          type: object
          description: "Optional app_ui policy override for this call."
    read_only: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false
    execution: sync
    affinity: any
    timeout_hint_secs: 5
    source_file: scripts/act.py
    next-tools:
      on-success:
        - app_ui__wait_for
        - app_ui__snapshot
      on-failure:
        - app_ui__snapshot
        - dcc_diagnostics__audit_log

  - name: wait_for
    description: >-
      Poll the scoped UI inside one tool call until a condition becomes
      true or times out. Use after app_ui__act before verifying with snapshot.
    input_schema:
      type: object
      required: [condition]
      properties:
        session_id:
          type: string
          description: "app_ui session id. Defaults to 'default'."
        condition:
          type: object
          required: [kind]
          properties:
            kind:
              type: string
              enum: [control_exists, control_missing, text_equals, value_equals, checked_equals, enabled, disabled, focused]
            control_id:
              type: string
            query:
              type: string
            role:
              type: string
            label:
              type: string
            text:
              type: string
            value:
              type: string
            checked:
              type: boolean
            timeout_ms:
              type: integer
              default: 5000
            interval_ms:
              type: integer
              default: 100
        policy:
          type: object
          description: "Optional app_ui policy override for this call."
    read_only: true
    idempotent: false
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: false
    execution: sync
    affinity: any
    timeout_hint_secs: 10
    source_file: scripts/wait_for.py
    next-tools:
      on-success:
        - app_ui__snapshot
      on-failure:
        - app_ui__snapshot

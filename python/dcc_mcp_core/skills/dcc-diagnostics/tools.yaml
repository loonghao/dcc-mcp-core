tools:
  - name: screenshot
    description: "Capture a screenshot of the current display or a specific window. Returns the image as a base64-encoded PNG. Useful for visual debugging — capture what's visible on screen when an error occurs."
    input_schema:
      type: object
      properties:
        format:
          type: string
          description: "Image format: 'png' (default), 'jpeg', or 'raw_bgra'"
          default: png
        scale:
          type: number
          description: "Scale factor 0.0-1.0 (default 1.0 = native resolution). Use 0.5 to halve the size."
          default: 1.0
        jpeg_quality:
          type: integer
          description: "JPEG quality 0-100 (default 85). Only used when format is 'jpeg'."
          default: 85
        window_title:
          type: string
          description: "Capture only the window whose title contains this substring. If omitted, captures the full screen."
        save_path:
          type: string
          description: "If provided, save the image to this file path in addition to returning base64."
        timeout_ms:
          type: integer
          description: "Maximum milliseconds to wait for a frame (default 5000)."
          default: 5000
    read_only: true
    idempotent: false
    source_file: scripts/screenshot.py

  - name: audit_log
    description: "Query the dcc-mcp-core sandbox audit log — list recent action invocations, filter by outcome (success/denied), or search by action name. Helps diagnose why an action was blocked or what the agent did recently."
    input_schema:
      type: object
      properties:
        filter:
          type: string
          description: "Filter entries: 'all' (default), 'success', 'denied', or 'error'"
          default: all
        action_name:
          type: string
          description: "Only return entries for this specific action name."
        limit:
          type: integer
          description: "Maximum number of entries to return (default 50)."
          default: 50
    read_only: true
    idempotent: true
    source_file: scripts/audit_log.py

  - name: tool_metrics
    description: "Show performance metrics for registered tools — invocation counts, success rates, average and P95/P99 latencies. Use to identify slow or failing tools."
    input_schema:
      type: object
      properties:
        action_name:
          type: string
          description: "If provided, return metrics only for this tool. Otherwise return all."
        sort_by:
          type: string
          description: "Sort results by: 'name', 'invocations' (default), 'avg_ms', 'p95_ms', or 'failure_rate'"
          default: invocations
        limit:
          type: integer
          description: "Maximum number of tools to return (default 20)."
          default: 20
    read_only: true
    idempotent: true
    source_file: scripts/tool_metrics.py

  - name: process_status
    description: "Check the health of tracked DCC processes — list running PIDs, check if a specific process is alive, and inspect crash recovery policy. Use when a DCC tool stops responding."
    input_schema:
      type: object
      properties:
        pid:
          type: integer
          description: "Check status of a specific process ID. If omitted, returns summary of all tracked processes."
    read_only: true
    idempotent: true
    source_file: scripts/process_status.py

  - name: error_report
    description: >-
      Collect a structured error report for any DCC environment.
      When to use: call this first whenever a tool fails with a vague error like
      "mcp tool execution failed" — it aggregates log file errors, failed job
      history, and process context into a single response so you can diagnose
      the root cause without multiple round-trips.
      How to use: optionally pass dcc_name (e.g. "maya") to scope the log and
      database search; omit to auto-detect. Increase tail_lines for more log
      context when errors are sparse.
    input_schema:
      type: object
      properties:
        dcc_name:
          type: string
          description: "DCC name to scope the search (e.g. 'maya', 'blender', 'houdini'). Auto-detected when omitted."
        log_dir:
          type: string
          description: "Directory containing dcc-mcp-*.log files. Defaults to DCC_MCP_LOG_DIR or platform log dir."
        db_path:
          type: string
          description: "Path to the SQLite job database. Auto-resolved from log_dir when omitted."
        tail_lines:
          type: integer
          description: "Number of tail lines to read from the log file (default 200)."
          default: 200
        job_limit:
          type: integer
          description: "Maximum failed jobs to return (default 20)."
          default: 20
    read_only: true
    idempotent: true
    next-tools:
      on-success:
        - dcc_diagnostics__audit_log
        - dcc_diagnostics__tool_metrics
        - dcc_diagnostics__screenshot
    source_file: scripts/error_report.py

version = "1.0"

[metadata]
author_name = "longhao"
author_email = "hal.long@outlook.com"
difficulty_explanation = """
Medium difficulty. Requires understanding the project's module structure,
writing targeted tests for uncovered code paths (subprocess, async, error
handling), resolving ruff lint errors across multiple files, and updating
CI configuration. No architectural changes needed.
"""
category = "testing-and-ci"
tags = ["python", "pytest", "coverage", "ruff", "ci", "github-actions", "lint"]

[agent]
timeout_sec = 1800.0
user = "agent"

[verifier]
timeout_sec = 300.0
env = {}
user = "root"

[solution]
env = {}

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
gpus = 0
allow_internet = true

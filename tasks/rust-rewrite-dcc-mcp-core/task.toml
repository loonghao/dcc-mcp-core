version = "1.0"
source = "https://github.com/loonghao/dcc-mcp-core"

[metadata]
author_name = "Hal Long"
author_email = "hal.long@outlook.com"
difficulty_explanation = "Complex multi-crate Rust+PyO3 rewrite of an existing Python library, requiring knowledge of Rust workspace, PyO3 0.23 API, maturin build system, GitHub Actions CI/CD, and MCP protocol types."
category = "programming"
tags = ["rust", "python", "pyo3", "maturin", "refactoring", "ci-cd", "dcc", "mcp"]

[verifier]
timeout_sec = 600
env = {}

[agent]
timeout_sec = 3600

[solution]
env = {}

[environment]
build_timeout_sec = 900
cpus = 4
memory_mb = 8192
storage_mb = 20480
gpus = 0
allow_internet = true
env = { CARGO_HOME = "/root/.cargo", RUSTUP_HOME = "/root/.rustup" }

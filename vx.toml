[tools]
python = "3.12"
just = "latest"
rust = "1.90"

[settings]
auto_install = true
cache_duration = "7d"

# All scripts delegate to just for consistency
[scripts]
check = "just check"
clippy = "just clippy"
fmt = "just fmt"
dev = "just dev"
install = "just install"
test = "just test"
test-rust = "just test-rust"
lint = "just lint"
lint-py = "just lint-py"
lint-fix = "just lint-fix"
build = "just build"
preflight = "just preflight"
ci = "just ci"
clean = "just clean"

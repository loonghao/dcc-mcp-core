[tools]
python = "3.12"
just = "latest"
rust = "1.90"

[settings]
auto_install = true
cache_duration = "7d"

[scripts]
check = "cargo check --workspace"
test-rust = "cargo test --workspace"
clippy = "cargo clippy --workspace -- -D warnings"
fmt = "cargo fmt --all"
dev = "maturin develop --features python-bindings,ext-module"
test = "pytest tests/ -v --tb=short"
lint = "ruff check python/dcc_mcp_core/ tests/"
lint-fix = "ruff check --fix python/dcc_mcp_core/ tests/"
build = "maturin build --release --features python-bindings,ext-module,abi3-py38"
prek = "prek"
prek-install = "prek install"
prek-all = "prek --all-files"
